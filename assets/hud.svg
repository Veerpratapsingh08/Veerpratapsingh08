<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="100%" height="100%">
  <defs>
    <!-- Background Dot Grid -->
    <pattern id="dotGrid" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#27272a" />
    </pattern>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      
      text { font-family: 'JetBrains Mono', monospace; }
      
      /* Smooth Rotation */
      .rotate {
        transform-origin: 120px 150px;
        animation: spin 10s linear infinite;
      }
      .rotate-reverse {
        transform-origin: 120px 150px;
        animation: spin 15s linear infinite reverse;
      }
      @keyframes spin { 100% { transform: rotate(360deg); } }

      /* Subdued Pulse */
      .pulse {
        animation: pulsing 3s ease-in-out infinite alternate;
      }
      @keyframes pulsing {
        0% { opacity: 0.3; }
        100% { opacity: 0.8; }
      }

      /* Clean Typing Animation */
      .log-line { opacity: 0; animation: fade-in 0.1s forwards; }
      .l1 { animation-delay: 0.5s; }
      .l2 { animation-delay: 1.0s; }
      .l3 { animation-delay: 1.5s; }
      .l4 { animation-delay: 2.0s; }
      .l5 { animation-delay: 2.5s; }
      .l6 { animation-delay: 3.0s; }
      
      @keyframes fade-in { to { opacity: 1; } }

      /* Sparkline Animation */
      .sparkline {
        stroke-dasharray: 400;
        stroke-dashoffset: 400;
        animation: draw 2s ease-out forwards;
        animation-delay: 1s;
      }
      @keyframes draw { to { stroke-dashoffset: 0; } }
      
      /* Bar chart animation */
      .bar {
        transform-origin: bottom;
        animation: grow 1s ease-out forwards;
      }
      .b1 { animation-delay: 0.2s; }
      .b2 { animation-delay: 0.4s; }
      .b3 { animation-delay: 0.6s; }
      .b4 { animation-delay: 0.8s; }
      .b5 { animation-delay: 1.0s; }
      .b6 { animation-delay: 1.2s; }
      
      @keyframes grow {
        0% { transform: scaleY(0); }
        100% { transform: scaleY(1); }
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="300" fill="#09090b" />
  <rect width="900" height="300" fill="url(#dotGrid)" />

  <!-- Top Bar -->
  <rect x="0" y="0" width="900" height="30" fill="#18181b" border-bottom="1px solid #27272a" />
  <text x="20" y="20" fill="#a1a1aa" font-size="12" font-weight="bold">SYSTEM_TELEMETRY_UPLINK // NODE: VPS-CORE</text>
  <text x="750" y="20" fill="#a1a1aa" font-size="12">STATUS: NOMINAL</text>
  <circle cx="870" cy="15" r="4" fill="#10b981" class="pulse" />

  <!-- UI Frame Borders -->
  <rect x="20" y="50" width="260" height="230" fill="none" stroke="#27272a" stroke-width="1" rx="4" />
  <rect x="300" y="50" width="380" height="230" fill="none" stroke="#27272a" stroke-width="1" rx="4" />
  <rect x="700" y="50" width="180" height="230" fill="none" stroke="#27272a" stroke-width="1" rx="4" />

  <!-- MODULE 1: Geometric Visualizer (Left) -->
  <g transform="translate(30, 50)">
    <text x="10" y="25" fill="#71717a" font-size="10">MODULE_01: SPATIAL_AWARENESS</text>
    <line x1="10" y1="35" x2="250" y2="35" stroke="#27272a" stroke-width="1" />
    
    <!-- Rotating wireframes -->
    <g transform="translate(30, 20)">
      <circle cx="90" cy="100" r="60" fill="none" stroke="#3f3f46" stroke-width="1" stroke-dasharray="4 4" class="rotate" />
      <circle cx="90" cy="100" r="40" fill="none" stroke="#52525b" stroke-width="1" class="rotate-reverse" />
      <polygon points="90,50 133,125 47,125" fill="none" stroke="#38bdf8" stroke-width="1" class="rotate" />
      <polygon points="90,150 47,75 133,75" fill="none" stroke="#38bdf8" stroke-width="1" opacity="0.5" class="rotate-reverse" />
      <circle cx="90" cy="100" r="3" fill="#38bdf8" />
    </g>
    
    <!-- Data readouts -->
    <text x="10" y="200" fill="#a1a1aa" font-size="10">PITCH: +12.4°</text>
    <text x="10" y="215" fill="#a1a1aa" font-size="10">YAW:   -04.1°</text>
    <text x="150" y="200" fill="#a1a1aa" font-size="10">MEM: 32GB</text>
    <text x="150" y="215" fill="#a1a1aa" font-size="10">CPU: 4.2GHz</text>
  </g>

  <!-- MODULE 2: System Logs (Center) -->
  <g transform="translate(300, 50)">
    <text x="15" y="25" fill="#71717a" font-size="10">MODULE_02: SYSTEM_EVENTS</text>
    <line x1="15" y1="35" x2="365" y2="35" stroke="#27272a" stroke-width="1" />
    
    <!-- Logs -->
    <g transform="translate(15, 65)">
      <text y="0" fill="#a1a1aa" font-size="12" class="log-line l1">[08:00:01] <tspan fill="#38bdf8">INFO</tspan> Boot sequence initiated.</text>
      <text y="25" fill="#a1a1aa" font-size="12" class="log-line l2">[08:00:03] <tspan fill="#38bdf8">INFO</tspan> Fetching architectural plans...</text>
      <text y="50" fill="#a1a1aa" font-size="12" class="log-line l3">[08:00:04] <tspan fill="#10b981">SUCC</tspan> Next.js Portfolio deployed to Vercel.</text>
      <text y="75" fill="#a1a1aa" font-size="12" class="log-line l4">[08:00:07] <tspan fill="#38bdf8">INFO</tspan> Calibrating ESP32 Motor Drivers...</text>
      <text y="100" fill="#a1a1aa" font-size="12" class="log-line l5">[08:00:09] <tspan fill="#10b981">SUCC</tspan> Hardware loop running at 1000Hz.</text>
      <text y="125" fill="#a1a1aa" font-size="12" class="log-line l6">[08:00:12] <tspan fill="#38bdf8">WAIT</tspan> Awaiting new build input...</text>
    </g>
  </g>

  <!-- MODULE 3: Analytics (Right) -->
  <g transform="translate(700, 50)">
    <text x="15" y="25" fill="#71717a" font-size="10">MODULE_03: PERFORMANCE</text>
    <line x1="15" y1="35" x2="165" y2="35" stroke="#27272a" stroke-width="1" />
    
    <!-- Animated Sparkline -->
    <text x="15" y="60" fill="#a1a1aa" font-size="10">THROUGHPUT</text>
    <path d="M 15 100 L 40 100 L 55 70 L 70 110 L 85 85 L 100 95 L 120 60 L 160 60" fill="none" stroke="#38bdf8" stroke-width="2" class="sparkline" />
    
    <!-- Animated Bar Chart -->
    <text x="15" y="140" fill="#a1a1aa" font-size="10">COMMIT_FREQ (7D)</text>
    <g transform="translate(15, 200) scale(1, -1)">
      <rect x="0" y="0" width="15" height="20" fill="#52525b" class="bar b1" />
      <rect x="22" y="0" width="15" height="40" fill="#52525b" class="bar b2" />
      <rect x="44" y="0" width="15" height="30" fill="#38bdf8" class="bar b3" />
      <rect x="66" y="0" width="15" height="50" fill="#52525b" class="bar b4" />
      <rect x="88" y="0" width="15" height="25" fill="#52525b" class="bar b5" />
      <rect x="110" y="0" width="15" height="45" fill="#38bdf8" class="bar b6" />
    </g>
  </g>

</svg>
